os:
  editCommand: 'floterm'
gui:
  showRandomTip: false
  showCommandLog: true
  expandFocusedSidePanel: true
  expandedSidePanelWeight: 3
  theme:
    selectedLineBgColor:
      - underline
    selectedRangeBgColor:
      - underline
git:
  overrideGpg: true # https://github.com/jesseduffield/lazygit/discussions/3948
  pagers:
    - pager: delta --paging=never
promptToReturnFromSubprocess: false
